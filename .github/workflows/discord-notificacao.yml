name: Notificar Discord

on:
  push:
    branches: [ "main", "desenvolvimento" ]
  pull_request:
    branches: [ "main" ]

jobs:
  alert-discord:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Action for Discord
        uses: savagecore/discord-webhook-notify@v1.1.1
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🚀 Novo Commit ou PR no GitHub!"
          description: "O usuário **${{ github.actor }}** fez um push ou PR no repositório **${{ github.repository }}**."
          username: "Robô DevOps"
